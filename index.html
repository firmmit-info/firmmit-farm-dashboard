<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIRMMIT 수직농장 모니터링</title>
    <style>
        :root {
            --bg-dark: #0a0e0c;
            --card-bg: #141b17;
            --accent-green: #00ff88;
            --accent-red: #ff4d6d;
            --accent-yellow: #ffd60a;
            --text-main: #e0e0e0;
            --text-sub: #a0a0a0;
            --border: #242b27;
        }
        body { margin:0; background:var(--bg-dark); color:var(--text-main); font-family: 'Pretendard', sans-serif; overflow-x:hidden; }
        .container { padding: 20px; max-width: 1400px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .logo { font-size: 22px; font-weight: 800; color: var(--accent-green); letter-spacing: -0.5px; }
        
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 25px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; transition: 0.3s; }
        /* 폰트 크기 18px로 상향 조정 */
        .card-title { font-size: 18px; font-weight: 700; color: var(--text-sub); margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        
        /* 유지보수 맵 스타일 */
        .map-section { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .map-card { position: relative; overflow-x: auto; }
        .floor-tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab { padding: 8px 20px; border-radius: 6px; cursor: pointer; background: #1e2622; border: 1px solid var(--border); font-size: 13px; }
        .tab.active { background: var(--accent-green); color: #000; font-weight: 700; }
        
        table { border-collapse: collapse; margin: 0 auto; }
        .rack-cell { width: 18px; height: 20px; border-radius: 2px; margin: 1px; cursor: pointer; position: relative; border: 1px solid rgba(255,255,255,0.05); }
        .rack-cell.normal { background: rgba(0, 255, 136, 0.1); }
        .rack-cell.need-fix { background: var(--accent-red); box-shadow: 0 0 8px var(--accent-red); animation: blink 1.5s infinite; }
        .rack-cell.warning { background: var(--accent-yellow); box-shadow: 0 0 8px var(--accent-yellow); }
        
        .y-label { color: var(--text-sub); text-align: right; padding-right: 10px; font-weight: 500; }
        .x-label { color: var(--text-sub); padding-top: 8px; font-weight: 500; }
        
        .rack-tooltip { visibility: hidden; position: absolute; bottom: 120%; left: 50%; transform: translateX(-50%); background: #000; color: #fff; padding: 8px 12px; border-radius: 4px; font-size: 11px; white-space: nowrap; z-index: 100; border: 1px solid var(--accent-green); }
        .rack-cell:hover .rack-tooltip { visibility: visible; }
        
        .issue-list { max-height: 500px; overflow-y: auto; }
        .issue-item { background: #1a221e; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--accent-yellow); cursor: pointer; }
        .issue-item.urgent { border-left-color: var(--accent-red); }
        .issue-location { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
        .issue-desc { font-size: 12px; color: var(--text-sub); }
        
        @keyframes blink { 50% { opacity: 0.4; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">FIRMMIT SMART FARM</div>
            <div id="last-update" style="font-size:12px; color:var(--text-sub);">연결 중...</div>
        </header>

        <div class="grid">
            <div class="card">
                <div class="card-title">☀️ 외부 환경</div>
                <div id="weather-info" style="font-size:24px; font-weight:800;">--°C / --%</div>
                <div id="weather-desc" style="font-size:13px; color:var(--accent-green); margin-top:5px;">로딩 중...</div>
            </div>
            <div class="card">
                <div class="card-title">🌡️ 내부 모니터링</div>
                <div id="env-info" style="font-size:24px; font-weight:800;">--°C / --%</div>
                <div style="font-size:12px; color:var(--text-sub); margin-top:5px;">CO2: --ppm | LUX: --</div>
            </div>
            <div class="card">
                <div class="card-title">🍓 실시간 수확량</div>
                <div id="harvest-info" style="font-size:24px; font-weight:800;">-- kg</div>
                <div style="font-size:12px; color:var(--accent-green); margin-top:5px;">이번 달 누적 합계</div>
            </div>
            <div class="card">
                <div class="card-title">⚡ 전력 사용량</div>
                <div id="power-info" style="font-size:24px; font-weight:800;">-- kW</div>
                <div style="font-size:12px; color:var(--accent-red); margin-top:5px;">부하율: --%</div>
            </div>
        </div>

        <div class="card map-card" style="margin-bottom: 25px;">
            <div class="card-title">🛠️ 재배기 유지보수 현황 맵</div>
            <div class="floor-tabs">
                <div class="tab active" onclick="switchFloor(1)">1층</div>
                <div class="tab" onclick="switchFloor(2)">2층</div>
            </div>
            <div class="map-section">
                <div style="background:#0d120f; padding:20px; border-radius:8px; border:1px solid #1a221e;">
                    <table id="farmMapTable"></table>
                </div>
                <div class="issue-list" id="maintenanceList">
                    <div style="text-align:center; padding:50px; color:var(--text-sub);">데이터 로딩 중...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ★중요: 구글 앱스 스크립트 배포 주소를 아래에 넣으세요
        const API_URL = 'https://script.google.com/macros/s/AKfycbwzmMyP5IWmDLol0F6F9mEAGNBNl2eqoObRLYRHq1FLwxdS-npdmhDprrbAYYTfYe7JUA/exec';
        
        let maintenanceData = [];
        let currentFloor = 1;

        async function fetchData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                // 날씨 업데이트
                document.getElementById('weather-info').innerText = `${data.weather.temperature}°C / ${data.weather.humidity}%`;
                document.getElementById('weather-desc').innerText = `상태: ${data.weather.description} | 풍속: ${data.weather.windSpeed}m/s`;
                
                // 내부 환경
                document.getElementById('env-info').innerText = `${data.env.current.temperature}°C / ${data.env.current.humidity}%`;
                
                // 수확량
                document.getElementById('harvest-info').innerText = `${data.harvest.monthTotal} kg`;
                
                // 전력
                document.getElementById('power-info').innerText = `${data.power.current.total} kW`;
                
                // 유지보수 데이터 저장 및 맵 렌더링
                maintenanceData = data.maintenance.items;
                renderFarmMap(currentFloor);
                
                document.getElementById('last-update').innerText = `최근 업데이트: ${new Date().toLocaleTimeString()}`;
            } catch (e) {
                console.error("데이터 로드 실패:", e);
                document.getElementById('last-update').innerText = "연결 오류 발생";
            }
        }

        function renderFarmMap(floor){
            const table = document.getElementById('farmMapTable');
            const X = 10; // 10열
            const Y = 15; // 15단
            const floorData = maintenanceData.filter(d => d.floor === floor);
            const issueMap = {};
            floorData.forEach(d => { issueMap[`${d.x}-${d.y}`] = d; });

            let html = '';
            for(let y = Y; y >= 1; y--){
                html += `<tr><td class="y-label" style="font-size:10px; width:35px;">${y}단</td>`;
                for(let x = 1; x <= X; x++){
                    ['A', 'B'].forEach(side => {
                        const locKey = `${x}${side}`;
                        const issue = issueMap[`${locKey}-${y}`];
                        let cls = 'rack-cell normal';
                        let tip = `✅ ${floor}층 ${x}열 ${y}단 ${side}면 · 정상`;
                        
                        if(issue){
                            if(issue.status === 'fix'){
                                cls = 'rack-cell need-fix';
                                tip = `⚠️ ${floor}층 ${x}열 ${y}단 ${side}면 · ${issue.desc}`;
                            } else if(issue.status === 'warning'){
                                cls = 'rack-cell warning';
                                tip = `🟡 ${floor}층 ${x}열 ${y}단 ${side}면 · ${issue.desc}`;
                            }
                        }
                        html += `<td><div class="${cls}" onclick="highlightIssue(${floor},'${locKey}',${y})"><div class="rack-tooltip">${tip}</div></div></td>`;
                    });
                    if(x < X) html += `<td style="width:10px;"></td>`;
                }
                html += '</tr>';
            }
            
            html += '<tr><td></td>';
            for(let x = 1; x <= X; x++){
                html += `<td colspan="2" class="x-label" style="text-align:center; font-size:10px;">${x}열</td>`;
                if(x < X) html += `<td></td>`;
            }
            html += '</tr>';
            table.innerHTML = html;
            renderMaintenanceList(floor);
        }

        function renderMaintenanceList(floor){
            const list = document.getElementById('maintenanceList');
            const issues = maintenanceData.filter(d => d.floor === floor && d.status !== 'done');
            
            if(issues.length === 0){
                list.innerHTML = `<div style="text-align:center; padding:30px; color:var(--accent-green);">✅ ${floor}층 이상 없음</div>`;
                return;
            }
            
            list.innerHTML = issues.map(d => {
                const isU = d.status === 'fix';
                return `<div class="issue-item ${isU?'urgent':''}" onclick="highlightIssue(${d.floor},'${d.x}',${d.y})">
                    <div class="issue-location">${d.floor}층 · ${d.x.replace(/[^0-9]/g, '')}열 ${d.x.replace(/[0-9]/g, '')}면 · ${d.y}단</div>
                    <div class="issue-desc">${d.desc}</div>
                    <div style="font-size:10px; color:var(--text-sub); margin-top:5px;">📅 ${d.date} | 상태: ${isU?'즉시수리':'점검필요'}</div>
                </div>`;
            }).join('');
        }

        function switchFloor(f){
            currentFloor = f;
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', i + 1 === f);
            });
            renderFarmMap(f);
        }

        function highlightIssue(floor, x, y){
            // 간단한 하이라이트 효과 (추후 확장 가능)
            console.log(`선택됨: ${floor}층 ${x}열 ${y}단`);
        }

        // 30초마다 자동 갱신
        fetchData();
        setInterval(fetchData, 30000);
    </script>
</body>
</html>
