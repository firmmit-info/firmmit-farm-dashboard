<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIRMMIT 스마트팜 대시보드</title>
    <style>
        :root {
            --bg-dark: #0a0e0c;
            --card-bg: #141b17;
            --accent-green: #00ff88;
            --accent-red: #ff4d6d;
            --accent-yellow: #ffd60a;
            --text-main: #e0e0e0;
            --text-sub: #a0a0a0;
            --border: #242b27;
        }
        body { margin:0; background:var(--bg-dark); color:var(--text-main); font-family: 'Pretendard', -apple-system, sans-serif; overflow-x:hidden; }
        .container { padding: 20px; max-width: 1400px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .logo { font-size: 22px; font-weight: 800; color: var(--accent-green); letter-spacing: -0.5px; }
        
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 25px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
        .card-title { font-size: 18px; font-weight: 700; color: var(--text-sub); margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        
        /* 유지보수 섹션 레이아웃 */
        .map-section { display: grid; grid-template-columns: 1fr 350px; gap: 25px; align-items: start; }
        .floor-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { padding: 8px 20px; border-radius: 6px; cursor: pointer; background: #1e2622; border: 1px solid var(--border); font-size: 13px; color: var(--text-sub); }
        .tab.active { background: var(--accent-green); color: #000; font-weight: 700; }
        
        table { border-collapse: collapse; margin: 0 auto; }
        .y-label { color: #555; text-align: right; padding-right: 12px; font-size: 11px; font-weight: bold; }
        .x-label { color: #555; padding-top: 10px; font-size: 11px; font-weight: bold; }
        
        .rack-pair { display: flex; gap: 2px; padding: 2px 0; }
        .rack-cell { width: 16px; height: 18px; border-radius: 2px; cursor: pointer; position: relative; border: 1px solid rgba(255,255,255,0.03); }
        .rack-cell.normal { background: rgba(0, 255, 136, 0.08); }
        .rack-cell.need-fix { background: var(--accent-red); box-shadow: 0 0 10px var(--accent-red); animation: blink 1.5s infinite; }
        .rack-cell.warning { background: var(--accent-yellow); box-shadow: 0 0 10px var(--accent-yellow); }
        
        .rack-tooltip { visibility: hidden; position: absolute; bottom: 130%; left: 50%; transform: translateX(-50%); background: #000; color: #fff; padding: 8px 12px; border-radius: 4px; font-size: 11px; white-space: nowrap; z-index: 100; border: 1px solid var(--accent-green); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .rack-cell:hover .rack-tooltip { visibility: visible; }
        
        .issue-list { max-height: 550px; overflow-y: auto; background: rgba(255,255,255,0.02); border-radius: 12px; padding: 15px; border: 1px solid var(--border); }
        .issue-item { background: #1a221e; padding: 15px; border-radius: 8px; margin-bottom: 12px; border-left: 4px solid var(--accent-yellow); transition: 0.2s; }
        .issue-item:hover { transform: translateX(5px); background: #222c26; }
        .issue-item.urgent { border-left-color: var(--accent-red); }
        .issue-location { font-size: 14px; font-weight: 700; margin-bottom: 6px; color: #fff; }
        .issue-desc { font-size: 12px; color: var(--text-sub); margin-bottom: 8px; }
        .issue-meta { font-size: 11px; display: flex; justify-content: space-between; align-items: center; }
        .status-tag { padding: 2px 6px; border-radius: 4px; font-weight: bold; font-size: 10px; }
        .tag-red { background: rgba(255,77,109,0.2); color: var(--accent-red); }
        .tag-yellow { background: rgba(255,214,10,0.2); color: var(--accent-yellow); }
        
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">FIRMMIT SMART FARM</div>
            <div id="last-update" style="font-size:12px; color:var(--text-sub);">연결 중...</div>
        </header>

        <div class="grid">
            <div class="card">
                <div class="card-title">☀️ 외부 환경</div>
                <div id="weather-info" style="font-size:24px; font-weight:800;">--°C / --%</div>
                <div id="weather-desc" style="font-size:13px; color:var(--accent-green); margin-top:5px;">데이터 수신 중...</div>
            </div>
            <div class="card">
                <div class="card-title">🌡️ 내부 모니터링</div>
                <div id="env-info" style="font-size:24px; font-weight:800;">--°C / --%</div>
                <div style="font-size:12px; color:var(--text-sub); margin-top:5px;">정상 작동 범위 내</div>
            </div>
            <div class="card">
                <div class="card-title">🍓 실시간 수확량</div>
                <div id="harvest-info" style="font-size:24px; font-weight:800;">-- kg</div>
                <div style="font-size:12px; color:var(--accent-green); margin-top:5px;">이번 달 누적</div>
            </div>
            <div class="card">
                <div class="card-title">⚡ 전력 사용량</div>
                <div id="power-info" style="font-size:24px; font-weight:800;">-- kW</div>
                <div style="font-size:12px; color:var(--accent-red); margin-top:5px;">실시간 소모량</div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">🛠️ 재배기 유지보수 현황 맵</div>
            <div class="floor-tabs">
                <div class="tab active" onclick="switchFloor(1)">1층</div>
                <div class="tab" onclick="switchFloor(2)">2층</div>
            </div>
            <div class="map-section">
                <div style="background:#0d120f; padding:25px; border-radius:12px; border:1px solid #1a221e; overflow-x: auto;">
                    <table id="farmMapTable"></table>
                </div>
                <div>
                    <div style="font-size:13px; font-weight:bold; margin-bottom:10px; color:var(--accent-red)">⚠️ 유지보수 필요 항목</div>
                    <div class="issue-list" id="maintenanceList">
                        <div style="text-align:center; padding:50px; color:var(--text-sub); font-size:12px;">데이터를 불러오고 있습니다...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ★중요: 사용자님의 구글 앱스 스크립트 API 주소
        const API_URL = 'https://script.google.com/macros/s/AKfycbwzmMyP5IWmDLol0F6F9mEAGNBNl2eqoObRLYRHq1FLwxdS-npdmhDprrbAYYTfYe7JUA/exec';
        
        let maintenanceData = [];
        let currentFloor = 1;

        async function init() {
            await fetchData();
            // 30초마다 갱신
            setInterval(fetchData, 30000);
        }

        async function fetchData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                // 상단 위젯 업데이트
                if(data.weather) {
                    document.getElementById('weather-info').innerText = `${data.weather.temperature}°C / ${data.weather.humidity}%`;
                    document.getElementById('weather-desc').innerText = `상태: ${data.weather.description} | 풍속: ${data.weather.windSpeed}m/s`;
                }
                if(data.env) document.getElementById('env-info').innerText = `${data.env.current.temperature}°C / ${data.env.current.humidity}%`;
                if(data.harvest) document.getElementById('harvest-info').innerText = `${data.harvest.monthTotal} kg`;
                if(data.power) document.getElementById('power-info').innerText = `${data.power.current.total} kW`;
                
                // 유지보수 데이터 저장 및 렌더링
                maintenanceData = data.maintenance.items || [];
                renderFarmMap(currentFloor);
                
                document.getElementById('last-update').innerText = `최근 업데이트: ${new Date().toLocaleTimeString()}`;
            } catch (e) {
                console.error("Fetch Error:", e);
                document.getElementById('last-update').innerText = "데이터 연결 오류";
            }
        }

        function renderFarmMap(floor){
            const table = document.getElementById('farmMapTable');
            const X = 10; // 10열
            const Y = 15; // 15단
            
            // 현재 층에 해당하고 완료되지 않은 데이터 필터링
            const floorData = maintenanceData.filter(d => Number(d.floor) === floor);
            
            // 매칭용 Map 생성
            const issueMap = {};
            floorData.forEach(d => {
                const key = `${String(d.x).trim().toUpperCase()}-${d.y}`;
                issueMap[key] = d;
            });

            let html = '';
            for(let y = Y; y >= 1; y--){
                html += `<tr><td class="y-label">${y}단</td>`;
                for(let x = 1; x <= X; x++){
                    html += `<td><div class="rack-pair">`;
                    ['A', 'B'].forEach(side => {
                        const locKey = `${x}${side}`;
                        const issue = issueMap[`${locKey}-${y}`];
                        let cls = 'rack-cell normal';
                        let tip = `✅ ${floor}층 ${x}열 ${y}단 ${side}면 (정상)`;
                        
                        if(issue && issue.status !== 'done'){
                            if(issue.status === 'fix'){
                                cls = 'rack-cell need-fix';
                                tip = `🔴 즉시수리: ${issue.desc}`;
                            } else if(issue.status === 'warning'){
                                cls = 'rack-cell warning';
                                tip = `🟡 점검필요: ${issue.desc}`;
                            }
                        }
                        html += `<div class="${cls}"><div class="rack-tooltip">${tip}</div></div>`;
                    });
                    html += `</div></td>`;
                    if(x < X) html += `<td style="width:12px;"></td>`; // 통로 간격
                }
                html += '</tr>';
            }
            
            // X축 라벨
            html += '<tr><td></td>';
            for(let x = 1; x <= X; x++){
                html += `<td class="x-label" style="text-align:center;">${x}열</td>`;
                if(x < X) html += `<td></td>`;
            }
            html += '</tr>';
            
            table.innerHTML = html;
            renderMaintenanceList(floor);
        }

        function renderMaintenanceList(floor){
            const list = document.getElementById('maintenanceList');
            const issues = maintenanceData.filter(d => Number(d.floor) === floor && d.status !== 'done');
            
            if(issues.length === 0){
                list.innerHTML = `<div style="text-align:center; padding:40px; color:var(--accent-green); font-size:13px;">✅ ${floor}층은 현재 수리 항목이 없습니다.</div>`;
                return;
            }
            
            list.innerHTML = issues.map(d => {
                const isUrgent = d.status === 'fix';
                const col = String(d.x).replace(/[^0-9]/g, '');
                const side = String(d.x).replace(/[0-9]/g, '');
                
                return `
                <div class="issue-item ${isUrgent ? 'urgent' : ''}">
                    <div class="issue-location">${d.floor}층 · ${col}열 ${side}면 · ${d.y}단</div>
                    <div class="issue-desc">${d.desc}</div>
                    <div class="issue-meta">
                        <span style="color:var(--text-sub)">📅 ${d.date}</span>
                        <span class="status-tag ${isUrgent ? 'tag-red' : 'tag-yellow'}">${isUrgent ? '즉시수리' : '점검필요'}</span>
                    </div>
                </div>`;
            }).join('');
        }

        function switchFloor(f){
            currentFloor = f;
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', i + 1 === f);
            });
            renderFarmMap(f);
        }

        init();
    </script>
</body>
</html>
