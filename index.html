<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIRMMIT SMART FARM DASHBOARD</title>
    <style>
        :root {
            --bg-dark: #0a0e0c;
            --card-bg: #141b17;
            --accent-green: #00ff88;
            --accent-red: #ff4d6d;
            --accent-yellow: #ffd60a;
            --text-main: #e0e0e0;
            --text-sub: #a0a0a0;
            --border: #242b27;
        }
        body { margin:0; background:var(--bg-dark); color:var(--text-main); font-family: 'Pretendard', sans-serif; }
        .container { padding: 20px; max-width: 1600px; margin: 0 auto; }
        
        /* 헤더 & 위젯 */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
        .card-title { font-size: 18px; font-weight: 700; color: var(--text-sub); margin-bottom: 10px; }
        .val { font-size: 26px; font-weight: 800; }

        /* 요약 바 (데이터 누락 방지!) */
        .summary-bar { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .sum-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 10px; padding: 15px; text-align: center; }
        .sum-val { font-size: 24px; font-weight: 800; margin-bottom: 5px; }
        .sum-lbl { font-size: 12px; color: var(--text-sub); }

        /* 메인 맵 섹션 */
        .main-layout { display: grid; grid-template-columns: 1fr 380px; gap: 20px; }
        .floor-btn-group { margin-bottom: 15px; display: flex; gap: 10px; }
        .f-btn { padding: 8px 18px; border-radius: 6px; border: 1px solid var(--border); background: #1e2622; color: var(--text-sub); cursor: pointer; }
        .f-btn.active { background: var(--accent-green); color: #000; font-weight: bold; }

        /* 맵 테이블 디자인 (2개 1세트 최적화) */
        .map-container { background: #0d120f; padding: 25px; border-radius: 12px; border: 1px solid var(--border); overflow-x: auto; }
        table { border-collapse: collapse; margin: 0 auto; }
        .y-lbl { color: #555; text-align: right; padding-right: 12px; font-size: 11px; font-weight: bold; }
        .x-lbl { color: #555; padding-top: 10px; font-size: 11px; font-weight: bold; text-align: center; }
        
        .rack-set { display: flex; gap: 2px; } /* A/B면 밀착 */
        .cell { width: 16px; height: 18px; border-radius: 2px; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; position: relative; }
        .cell.normal { background: rgba(0, 255, 136, 0.1); }
        .cell.fix { background: var(--accent-red); box-shadow: 0 0 10px var(--accent-red); animation: blink 1.5s infinite; }
        .cell.warn { background: var(--accent-yellow); box-shadow: 0 0 10px var(--accent-yellow); }
        
        /* 리스트 디자인 */
        .list-container { background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border); padding: 15px; }
        .issue-item { background: #1a221e; padding: 15px; border-radius: 8px; margin-bottom: 12px; border-left: 4px solid var(--accent-yellow); }
        .issue-item.urgent { border-left-color: var(--accent-red); }
        .i-loc { font-size: 14px; font-weight: bold; margin-bottom: 5px; }
        .i-msg { font-size: 12px; color: var(--text-sub); }
        .i-tag { display: inline-block; margin-top: 8px; font-size: 10px; font-weight: bold; padding: 2px 6px; border-radius: 4px; }

        @keyframes blink { 50% { opacity: 0.4; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div style="font-size:22px; font-weight:900; color:var(--accent-green);">FIRMMIT SMART FARM</div>
            <div id="u-time" style="font-size:12px; color:var(--text-sub);">연결 중...</div>
        </header>

        <div class="grid-4">
            <div class="card"><div class="card-title">☀️ 외부 환경</div><div id="w-val" class="val">--°C / --%</div></div>
            <div class="card"><div class="card-title">🌡️ 내부 환경</div><div id="e-val" class="val">--°C / --%</div></div>
            <div class="card"><div class="card-title">🍓 이달 수확</div><div id="h-val" class="val">-- kg</div></div>
            <div class="card"><div class="card-title">⚡ 실시간 전력</div><div id="p-val" class="val">-- kW</div></div>
        </div>

        <div class="summary-bar">
            <div class="sum-card"><div class="sum-val" style="color:var(--accent-green);">300</div><div class="sum-lbl">총 재배기 (2개층)</div></div>
            <div class="sum-card"><div id="sum-fix" class="sum-val" style="color:var(--accent-red);">0</div><div class="sum-lbl">🚨 즉시 수리 필요</div></div>
            <div class="sum-card"><div id="sum-warn" class="sum-val" style="color:var(--accent-yellow);">0</div><div class="sum-lbl">⚠️ 점검 필요</div></div>
        </div>

        <div class="main-layout">
            <div class="map-card card">
                <div class="card-title">🛠️ 재배기 유지보수 현황 맵</div>
                <div class="floor-btn-group">
                    <button id="btn1" class="f-btn active" onclick="chFloor(1)">1층</button>
                    <button id="btn2" class="f-btn" onclick="chFloor(2)">2층</button>
                </div>
                <div class="map-container">
                    <table id="mapTable"></table>
                </div>
            </div>
            
            <div class="list-container">
                <div style="font-weight:bold; color:var(--accent-red); margin-bottom:15px; display:flex; justify-content:space-between;">
                    <span>유지보수 필요 항목</span>
                    <span id="list-cnt" style="background:var(--accent-red); color:#fff; padding:0 8px; border-radius:10px; font-size:11px;">0</span>
                </div>
                <div id="issueList" style="max-height:600px; overflow-y:auto;"></div>
            </div>
        </div>
    </div>

    <script>
        const API = 'https://script.google.com/macros/s/AKfycbwzmMyP5IWmDLol0F6F9mEAGNBNl2eqoObRLYRHq1FLwxdS-npdmhDprrbAYYTfYe7JUA/exec';
        let rawData = [];
        let curF = 1;

        async function load() {
            try {
                const r = await fetch(API);
                const d = await r.json();
                
                // 데이터 매핑
                document.getElementById('w-val').innerText = `${d.weather.temperature}°C / ${d.weather.humidity}%`;
                document.getElementById('e-val').innerText = `${d.env.current.temperature}°C / ${d.env.current.humidity}%`;
                document.getElementById('h-val').innerText = `${d.harvest.monthTotal} kg`;
                document.getElementById('p-val').innerText = `${d.power.current.total} kW`;
                
                // 요약 숫자 업데이트
                document.getElementById('sum-fix').innerText = d.maintenance.summary.urgent;
                document.getElementById('sum-warn').innerText = d.maintenance.summary.warning;
                
                rawData = d.maintenance.items || [];
                draw(curF);
                document.getElementById('u-time').innerText = `Update: ${new Date().toLocaleTimeString()}`;
            } catch(e) { console.error(e); }
        }

        function draw(f) {
            const table = document.getElementById('mapTable');
            const X=10, Y=15; // 10열 15단
            const fData = rawData.filter(d => Number(d.floor) === f);
            const iMap = {};
            fData.forEach(d => { iMap[`${String(d.x).toUpperCase()}-${d.y}`] = d; });

            let h = '';
            for(let y=Y; y>=1; y--) {
                h += `<tr><td class="y-lbl">${y}단</td>`;
                for(let x=1; x<=X; x++) {
                    h += `<td><div class="rack-set">`;
                    ['A','B'].forEach(s => {
                        const key = `${x}${s}-${y}`;
                        const is = iMap[key];
                        let c = 'cell normal', t = `${f}층 ${x}열 ${s}면 ${y}단: 정상`;
                        if(is && is.status !== 'done') {
                            if(is.status==='fix') { c='cell fix'; t=`🚨 즉시수리: ${is.desc}`; }
                            else if(is.status==='warning') { c='cell warn'; t=`⚠️ 점검필요: ${is.desc}`; }
                        }
                        h += `<div class="${c}" title="${t}"></div>`;
                    });
                    h += `</div></td>`;
                    if(x < X) h += `<td style="width:12px;"></td>`; // 통로
                }
                h += '</tr>';
            }
            h += '<tr><td></td>';
            for(let x=1; x<=X; x++) {
                h += `<td class="x-lbl">${x}열</td>`;
                if(x < X) h += `<td></td>`;
            }
            h += '</tr>';
            table.innerHTML = h;

            // 리스트 업데이트
            const list = document.getElementById('issueList');
            const activeIs = fData.filter(d => d.status !== 'done');
            document.getElementById('list-cnt').innerText = activeIs.length;
            
            if(activeIs.length === 0) {
                list.innerHTML = `<div style="text-align:center; padding:40px; color:var(--accent-green);">✅ 이상 없음</div>`;
            } else {
                list.innerHTML = activeIs.map(d => `
                    <div class="issue-item ${d.status==='fix'?'urgent':''}">
                        <div class="i-loc">${d.floor}층 · ${d.x} · ${d.y}단</div>
                        <div class="i-msg">${d.desc}</div>
                        <div class="i-tag" style="background:${d.status==='fix'?'rgba(255,77,109,0.1)':'rgba(255,214,10,0.1)'}; color:${d.status==='fix'?'var(--accent-red)':'var(--accent-yellow)'}">
                            ${d.status==='fix'?'IMMEDIATE FIX':'CHECK NEEDED'}
                        </div>
                    </div>
                `).join('');
            }
        }

        function chFloor(f) {
            curF = f;
            document.getElementById('btn1').classList.toggle('active', f===1);
            document.getElementById('btn2').classList.toggle('active', f===2);
            draw(f);
        }

        load();
        setInterval(load, 30000);
    </script>
</body>
</html>
